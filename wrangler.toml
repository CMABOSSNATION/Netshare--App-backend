name = "netshare-relay"
main = "src/relay.js"
compatibility_date = "2025-01-01"

# KV namespace for session storage
# Create with: wrangler kv:namespace create SESSIONS
# Then replace the id below with the output id
[[kv_namespaces]]
binding = "SESSIONS"
id      = "YOUR_KV_NAMESPACE_ID"

# Secrets (set with: wrangler secret put ADMIN_KEY)
# ADMIN_KEY — for the /admin/sessions endpoint

[vars]
# No vars needed — secrets go in wrangler secret put

# The probe endpoint uses cloudflare:sockets to test TCP reachability
# This requires nodejs_compat or the sockets flag
[compatibility_flags]
compatibility_flags = ["nodejs_compat"]
