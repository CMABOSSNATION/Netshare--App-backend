name               = "netshare-relay"
main               = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Durable Object — holds all WebSocket session state
[[durable_objects.bindings]]
name       = "RELAY"
class_name = "RelaySession"

# new_sqlite_classes = works on FREE plan
[[migrations]]
tag = "v1"
new_sqlite_classes = ["RelaySession"]

# Environment variables
# NOTE: Set the real ADMIN_KEY value in Cloudflare dashboard
# (Settings → Variables) — not here, since this file is public on GitHub.
[vars]
ADMIN_KEY = "change-me"
